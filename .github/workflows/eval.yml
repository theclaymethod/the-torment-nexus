name: eval

on:
  push:
    branches: [main]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Syntax-check all modules
        run: |
          set -e
          for f in $(find bin src evals -name '*.mjs'); do node --check "$f"; done
      - name: Prove graders
        run: node evals/test_grade.mjs
      - name: Run eval suite (CI gate)
        run: node evals/run.mjs
